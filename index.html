<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ДокОбразец — юридические документы онлайн</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0d6efd 0%, #20c997 100%);
            min-height: 100vh;
            color: #fff;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            flex-wrap: wrap;
            gap: 15px;
            backdrop-filter: blur(10px);
            background: rgba(0, 0, 0, 0.1);
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 30px;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .nav a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        .hero {
            text-align: center;
            padding: 80px 20px;
        }

        .hero h1 {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 16px;
        }

        .hero p {
            font-size: 20px;
            opacity: 0.9;
            margin-bottom: 32px;
        }

        .hero .btn-primary {
            background: white;
            color: #0d6efd;
            border: none;
            padding: 12px 32px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .hero .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .categories {
            display: flex;
            justify-content: center;
            gap: 24px;
            padding: 20px 40px 60px;
            flex-wrap: wrap;
        }

        .category-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 24px 32px;
            text-align: center;
            color: #0d6efd;
            font-weight: 600;
            font-size: 18px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
            cursor: pointer;
        }

        .category-card:hover {
            transform: translateY(-5px);
        }

        .scenarios-container {
            background: #F5F7FA;
            border-radius: 32px 32px 0 0;
            padding: 40px;
            margin-top: 20px;
            color: #2C3E50;
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card-btn {
            background: #FFFFFF;
            border: 1px solid #E8ECEF;
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .card-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            border-color: #20c997;
        }

        .card-icon {
            width: 48px;
            height: 48px;
            background: #E9F7F2;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .card-content h3 {
            font-size: 18px;
            font-weight: 600;
            color: #0d6efd;
            margin-bottom: 4px;
        }

        .card-content p {
            font-size: 14px;
            color: #5A6E85;
        }

        .scenario-panel {
            display: none;
            margin-top: 20px;
        }

        .scenario-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .scenario-title {
            font-size: 24px;
            font-weight: 600;
            color: #0d6efd;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid #0d6efd;
            color: #0d6efd;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
        }

        .question-area {
            background: #F8FAFE;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            font-size: 18px;
            border-left: 4px solid #20c997;
            color: #2C3E50;
        }

        .answer-area {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .answer-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #E0E4E8;
            border-radius: 30px;
            font-size: 16px;
        }

        .btn-primary-small {
            background: #0d6efd;
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 30px;
            cursor: pointer;
        }

        .document-area {
            background: #F8FAFE;
            border-radius: 16px;
            padding: 20px;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            font-size: 14px;
            max-height: 500px;
            overflow: auto;
            margin-top: 20px;
            color: #2C3E50;
        }

        .result-panel {
            display: none;
            margin-top: 20px;
        }

        .result-document {
            background: #F8FAFE;
            border-radius: 16px;
            padding: 20px;
            white-space: pre-wrap;
            font-size: 14px;
            max-height: 500px;
            overflow: auto;
            margin-bottom: 20px;
            color: #2C3E50;
        }

        .result-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .btn-result {
            background: #0d6efd;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
        }

        .legal-info {
            margin-top: 20px;
            padding: 15px;
            background: #E9F7F2;
            border-left: 4px solid #20c997;
            font-size: 14px;
            color: #2C3E50;
        }

        @media (max-width: 700px) {
            .header { flex-direction: column; }
            .hero h1 { font-size: 32px; }
            .buttons-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="logo">📄 ДокОбразец</div>
    <div class="nav">
        <a href="#" id="navHome">Главная</a>
        <a href="#" id="navHowItWorks">Как это работает</a>
        <a href="#" id="navTariffs">Тарифы</a>
        <a href="#" id="navHelp">Помощь</a>
    </div>
</header>

<section class="hero">
    <h1>Создайте юридические документы онлайн</h1>
    <p>Быстро и удобно за несколько минут</p>
    <button class="btn-primary" id="scrollToDocs">📄 Создать документ</button>
</section>

<div class="categories" id="categoryScroll">
    <div class="category-card" data-category="receipts">📑 Расписки и договоры</div>
    <div class="category-card" data-category="claims">⚖️ Досудебные претензии</div>
    <div class="category-card" data-category="complaints">📢 Жалобы в госорганы</div>
</div>

<div class="scenarios-container" id="scenariosContainer">
    <div id="selectorBlock">
        <div class="buttons-grid" id="docsGrid"></div>
    </div>

    <div id="scenarioPanel" class="scenario-panel">
        <div class="scenario-header">
            <div class="scenario-title" id="scenarioTitle"></div>
            <div>
                <button id="resetBtn" class="btn-secondary">Сбросить сессию</button>
                <button id="backBtn" class="btn-secondary">Назад</button>
            </div>
        </div>
        <div id="questionArea" class="question-area">Вопрос будет здесь</div>
        <div class="answer-area">
            <input type="text" id="answerInput" class="answer-input" placeholder="Введите ответ...">
            <button id="sendBtn" class="btn-primary-small">Отправить</button>
        </div>
        <div id="documentArea" class="document-area" style="display: none;"></div>
        <div id="stepInfo" class="step-info"></div>
    </div>

    <div id="resultPanel" class="result-panel">
        <div class="result-header" style="font-size:24px; font-weight:600;">Документ готов</div>
        <div id="resultDocument" class="result-document"></div>
        <div class="result-actions">
            <button id="printBtn" class="btn-result">Печать / PDF</button>
            <button id="saveBtn" class="btn-result">Сохранить</button>
            <button id="newDocBtn" class="btn-result">Новый документ</button>
        </div>
    </div>
</div>

<script>
    window.API_URL = 'http://127.0.0.1:8000';
    const API_BASE = window.API_URL + '/api/scenario';

    let currentSessionId = null;
    let currentScenarioType = null;
    let currentScenarioName = '';
    let isComplete = false;
    let isLoading = false;

    const selectorBlock = document.getElementById('selectorBlock');
    const scenarioPanel = document.getElementById('scenarioPanel');
    const resultPanel = document.getElementById('resultPanel');
    const docsGrid = document.getElementById('docsGrid');
    const scenarioTitle = document.getElementById('scenarioTitle');
    const questionArea = document.getElementById('questionArea');
    const answerInput = document.getElementById('answerInput');
    const sendBtn = document.getElementById('sendBtn');
    const resetBtn = document.getElementById('resetBtn');
    const backBtn = document.getElementById('backBtn');
    const documentArea = document.getElementById('documentArea');
    const resultDocument = document.getElementById('resultDocument');
    const newDocBtn = document.getElementById('newDocBtn');
    const printBtn = document.getElementById('printBtn');
    const saveBtn = document.getElementById('saveBtn');

    const docs = {
        receipts: [
            { type: "receipt_simple", name: "Простая расписка", desc: "Долговая расписка", icon: "₽" },
            { type: "receipt_advanced", name: "Расширенная расписка", desc: "С процентами, штрафами", icon: "%" },
            { type: "loan", name: "Договор займа", desc: "Стандартный договор", icon: "📄" }
        ],
        claims: [
            { type: "claim_marketplace_buyer", name: "Досудебная претензия на маркетплейс", desc: "Ozon, WB, Яндекс", icon: "🛒" },
            { type: "claim_universal", name: "Досудебная претензия (универсальная)", desc: "Любому получателю", icon: "⚖️" },
            { type: "claim_bank_block", name: "Претензия в банк", desc: "ФЗ-115 блокировка", icon: "🏦" }
        ],
        complaints: [
            { type: "complaint_rospotrebnadzor", name: "Жалоба в Роспотребнадзор", desc: "Защита прав потребителей", icon: "🛡️" },
            { type: "complaint_prosecutor", name: "Жалоба в прокуратуру", desc: "Надзор за правами", icon: "⚡" }
        ]
    };

    function renderDocs() {
        docsGrid.innerHTML = '';
        [...docs.receipts, ...docs.claims, ...docs.complaints].forEach(doc => {
            const card = document.createElement('div');
            card.className = 'card-btn';
            card.setAttribute('data-type', doc.type);
            card.innerHTML = `
                <div class="card-icon">${doc.icon}</div>
                <div class="card-content">
                    <h3>${doc.name}</h3>
                    <p>${doc.desc}</p>
                </div>
            `;
            card.onclick = () => showScenario(doc.type, doc.name);
            docsGrid.appendChild(card);
        });
    }

    function showSelector() {
        selectorBlock.style.display = 'block';
        scenarioPanel.style.display = 'none';
        resultPanel.style.display = 'none';
        currentSessionId = null;
        currentScenarioType = null;
        isComplete = false;
        answerInput.value = '';
    }

    async function showScenario(type, name) {
        selectorBlock.style.display = 'none';
        scenarioPanel.style.display = 'block';
        resultPanel.style.display = 'none';
        currentScenarioType = type;
        currentScenarioName = name;
        scenarioTitle.innerText = name;
        currentSessionId = crypto.randomUUID();
        isComplete = false;
        questionArea.innerText = '⏳ Загрузка...';
        try {
            const resp = await fetch(`${API_BASE}/${type}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: currentSessionId, answer: '' })
            });
            const data = await resp.json();
            if (data.is_complete) {
                showResult(data.document);
            } else {
                questionArea.innerText = data.question;
                answerInput.disabled = false;
                sendBtn.disabled = false;
            }
        } catch (err) {
            questionArea.innerText = 'Ошибка загрузки. Проверьте сервер.';
        }
    }

    async function sendAnswer() {
        if (!currentSessionId || !currentScenarioType) return;
        const answer = answerInput.value.trim();
        if (!answer) return;
        answerInput.disabled = true;
        sendBtn.disabled = true;
        questionArea.innerText = '⏳ Обработка...';
        try {
            const resp = await fetch(`${API_BASE}/${currentScenarioType}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: currentSessionId, answer })
            });
            const data = await resp.json();
            if (data.is_complete) {
                showResult(data.document);
            } else {
                questionArea.innerText = data.question;
                answerInput.value = '';
                answerInput.disabled = false;
                sendBtn.disabled = false;
            }
        } catch (err) {
            questionArea.innerText = 'Ошибка. Попробуйте ещё раз.';
            answerInput.disabled = false;
            sendBtn.disabled = false;
        }
    }

    function showResult(docText) {
        scenarioPanel.style.display = 'none';
        resultPanel.style.display = 'block';
        resultDocument.innerText = docText;
    }

    newDocBtn.addEventListener('click', showSelector);
    sendBtn.addEventListener('click', sendAnswer);
    backBtn.addEventListener('click', showSelector);
    resetBtn.addEventListener('click', async () => {
        if (currentSessionId && currentScenarioType) {
            await fetch(`${API_BASE}/${currentScenarioType}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: currentSessionId, answer: '' })
            });
        }
        showSelector();
    });

    printBtn.addEventListener('click', () => window.print());
    saveBtn.addEventListener('click', () => {
        const text = resultDocument.innerText;
        if (!text) return;
        const blob = new Blob([text], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${currentScenarioType || 'document'}.txt`;
        a.click();
        URL.revokeObjectURL(a.href);
    });

    document.getElementById('scrollToDocs').addEventListener('click', () => {
        document.getElementById('scenariosContainer').scrollIntoView({ behavior: 'smooth' });
    });

    document.querySelectorAll('.category-card').forEach(card => {
        card.addEventListener('click', () => {
            document.getElementById('scenariosContainer').scrollIntoView({ behavior: 'smooth' });
        });
    });

    renderDocs();
    showSelector();
</script>
</body>
</html>
